# guacd -- the actual VNC/RDP protocol proxy. Private-only: no public
# service block, reachable from the guacamole app over Fly's internal
# 6PN network at niksenflow-guacd.internal:4822 (see fly.guacamole.toml).
app = "niksenflow-guacd"
primary_region = "syd"

[build]
  image = "guacamole/guacd:1.5.5"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
